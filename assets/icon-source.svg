<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="cardShadow" x="-20%" y="-15%" width="140%" height="135%">
      <feDropShadow dx="5" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="54%" r="42%">
      <stop offset="0%" stop-color="#2E1108"/>
      <stop offset="100%" stop-color="#1C0F06"/>
    </radialGradient>
  </defs>

  <!-- Background: deep espresso -->
  <rect width="1024" height="1024" fill="url(#bgGlow)"/>

  <!-- Slightly-offset second card (depth illusion) -->
  <g transform="translate(524, 512) rotate(-2)">
    <rect x="-220" y="-280" width="440" height="560" rx="18" fill="#E8D0A8" opacity="0.35"/>
  </g>

  <!-- Main recipe card with drop shadow -->
  <g transform="translate(508, 508) rotate(-7)" filter="url(#cardShadow)">
    <rect x="-220" y="-280" width="440" height="560" rx="18" fill="#F5EDD9"/>
  </g>

  <!-- Card surface details -->
  <g transform="translate(508, 508) rotate(-7)">

    <!-- Red margin line -->
    <line x1="-148" y1="-280" x2="-148" y2="280" stroke="#CC4444" stroke-width="2.5" opacity="0.6"/>

    <!-- Blue ruled lines -->
    <line x1="-220" y1="-210" x2="220" y2="-210" stroke="#7BA8CC" stroke-width="2" opacity="0.5"/>
    <line x1="-220" y1="-160" x2="220" y2="-160" stroke="#7BA8CC" stroke-width="2" opacity="0.5"/>
    <line x1="-220" y1="-110" x2="220" y2="-110" stroke="#7BA8CC" stroke-width="2" opacity="0.5"/>
    <line x1="-220" y1="-60"  x2="220" y2="-60"  stroke="#7BA8CC" stroke-width="2" opacity="0.5"/>
    <line x1="-220" y1="-10"  x2="220" y2="-10"  stroke="#7BA8CC" stroke-width="2" opacity="0.5"/>
    <line x1="-220" y1="40"   x2="220" y2="40"   stroke="#7BA8CC" stroke-width="2" opacity="0.5"/>
    <line x1="-220" y1="90"   x2="220" y2="90"   stroke="#7BA8CC" stroke-width="2" opacity="0.5"/>
    <line x1="-220" y1="140"  x2="220" y2="140"  stroke="#7BA8CC" stroke-width="2" opacity="0.5"/>
    <line x1="-220" y1="190"  x2="220" y2="190"  stroke="#7BA8CC" stroke-width="2" opacity="0.5"/>
    <line x1="-220" y1="240"  x2="220" y2="240"  stroke="#7BA8CC" stroke-width="2" opacity="0.5"/>

    <!-- Hole punch (ring at top centre) -->
    <circle cx="0" cy="-252" r="28" fill="#DCC898" opacity="0.8"/>
    <circle cx="0" cy="-252" r="18" fill="#1C0F06" opacity="0.12"/>

    <!-- ── FORK (left) ── -->
    <g transform="translate(-65, 14)" fill="#E8521A">
      <!-- Tine 1 -->
      <rect x="-27" y="-152" width="12" height="85" rx="6"/>
      <!-- Tine 2 -->
      <rect x="-7"  y="-152" width="12" height="85" rx="6"/>
      <!-- Tine 3 -->
      <rect x="13"  y="-152" width="12" height="85" rx="6"/>
      <!-- Shoulder connecting tines to handle -->
      <rect x="-27" y="-73"  width="52" height="14" rx="5"/>
      <!-- Handle -->
      <rect x="-7"  y="-59"  width="14" height="218" rx="7"/>
    </g>

    <!-- ── SPOON (right) ── -->
    <g transform="translate(65, 14)" fill="#E8521A">
      <!-- Bowl -->
      <ellipse cx="0" cy="-132" rx="39" ry="52"/>
      <!-- Handle (overlaps bottom of bowl slightly for clean join) -->
      <rect x="-7" y="-88" width="14" height="247" rx="7"/>
    </g>

  </g>
</svg>
