<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- Rounded square: espresso background -->
  <rect width="64" height="64" rx="14" fill="#1C0F06"/>

  <!-- Subtle warm inner glow -->
  <radialGradient id="g" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#3A1A0A"/>
    <stop offset="100%" stop-color="#1C0F06"/>
  </radialGradient>
  <rect width="64" height="64" rx="14" fill="url(#g)"/>

  <!-- Fork (left, centred at x=22) -->
  <g fill="#E8521A">
    <!-- tine 1 -->
    <rect x="13" y="12" width="4" height="19" rx="2"/>
    <!-- tine 2 -->
    <rect x="20" y="12" width="4" height="19" rx="2"/>
    <!-- tine 3 -->
    <rect x="27" y="12" width="4" height="19" rx="2"/>
    <!-- shoulder -->
    <rect x="13" y="28" width="18" height="5" rx="2.5"/>
    <!-- handle -->
    <rect x="20" y="33" width="4" height="20" rx="2"/>
  </g>

  <!-- Spoon (right, centred at x=42) -->
  <g fill="#E8521A">
    <!-- bowl -->
    <ellipse cx="42" cy="21" rx="8" ry="11"/>
    <!-- handle -->
    <rect x="39" y="31" width="6" height="22" rx="3"/>
  </g>

</svg>
